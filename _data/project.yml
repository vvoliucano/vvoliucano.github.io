- id: proteus
  title: Proteus Mobile
  image: proteus.png
  description: "Proteus is a multi-agent framework designed to automatically adapt desktop visualizations for mobile devices."
  description_zh: "一种基于多智能体的可视化自适应框架，用于自动将桌面可视化适配至移动设备。"
  paper: "https://arxiv.org/pdf/2604.23299.pdf"
  demo: "/projects/proteus/"
  highlight: 1


- id: glyphweaver
  title: Glyph-Weaver
  image: 25_glyphweaver.png
  description: "We proposed a visual design creativity activation model."
  description_zh: "一种基于统一的Glyph DSL和AI的Glyph设计创造力激活模型。"
  # paper: "https://arxiv.org/pdf/2303.14476.pdf"
  demo: "https://glyphweaver.github.io/"
  highlight: 1


- id: spatialconstraint
  title: Spatial-Constraint Model
  image: 24_spatial_constraint.gif
  description: "We proposed a spatial constraint model for activating static visualization."
  description_zh: "空间约束模型以激活静态可视化：将可视化空间隐喻为物理空间，并引入物理学中力的概念表达视觉元素，并支持用户交互。"
  paper: "https://arxiv.org/pdf/2303.14476.pdf"
  video: https://youtu.be/i8C8lGAVLdI
  highlight: 1
  demo: /projects/spatialconstraint/

- id: smartcube
  title: SmartCube
  image: 20-smartcube.png
  description: "We proposed an adaptive data management architecture for the real-time visualization of spatiotemporal datasets"
  description_zh: "一种针对大规模时空数据可视化的自适应数据管理方法。"
  paper: "https://doi.org/10.1109/TVCG.2019.2934434"
  highlight: 1


- id: datawink
  title: DataWink
  image: datawink.gif
  description: "A system that supports interactive data communication by leveraging AI to help users generate, refine, and present data-driven narratives."
  description_zh: "一个利用 AI 支持数据表达与沟通的交互系统，帮助用户生成、优化并呈现数据驱动的叙事。"
  paper: "https://doi.org/10.1109/TVCG.2025.3634635"
  pdf: "https://arxiv.org/abs/2507.17734"
  demo: "https://shellywhen.github.io/projects/DataWink"
  video: "https://youtu.be/hSWl-XKrv88"
  slides: "https://hkustconnect-my.sharepoint.com/:p:/g/personal/lxieai_connect_ust_hk/EU1xLq0pIP5FvfAALX8JZjMBgg3D0RFun4UFQeeMHi69qQ?e=axnBiR"
  highlight: 1


- id: dnnvolvis
  title: DNN-VolVis
  image: 19_dnnvolvis.gif
  description: "We proposed a deep learning-based volume rendering pipeline."
  description_zh: "基于深度学习的三维模拟数据渲染。"
  paper: "http://vis.pku.edu.cn/research/publication/pvis19_dnnvolvis.pdf"


- id: autocaption
  title: AutoCaption
  image: 19-AutoCap.gif
  description: "We designed and trained deep learning models to generate short descriptions for SVG-formatted charts automatically."
  description_zh: "一种基于深度学习模型来自动生成图表描述的方法。"
  paper: "https://doi.org/10.1109/PacificVis48177.2020.1043"
  poster: "/assets/paper/19-Caption.pdf"

- id: prompthis
  title: PrompTHis
  image: prompthis.webp
  description: "An interactive system that helps users explore and refine prompts for text-to-image generation through visual and iterative workflows."
  description_zh: "一个支持文本到图像生成的交互式提示探索系统，通过可视化和迭代方式帮助用户优化 prompt。"
  paper: "https://doi.org/10.1109/TVCG.2024.3408255"
  video: "https://drive.google.com/file/d/1-qns__NkgdoOCSp3sJ2m-lsBb5p6OYsL/view?usp=sharing"
  demo: "https://vis4sense.github.io/prompthis/"
  highlight: 1


- id: autotitle
  title: AutoTitle
  image: 23_title.jpg
  description: "We proposed a semi-automatic method for title generation."
  description_zh: "交互式智能多维标题生成。"
  highlight: 3
  paper: "/assets/paper/23-autotitle.pdf"

- id: oldvis
  title: Historical Visualization
  image: 24-oldvis.png
  description: "OldVisOnline is a collection of old visualizations published before 1950. We have been studying a variety of usage scenarios of OldVisOnline."
  description_zh: "OldVisOnline 是一个收录公元1950年之前发布的历史可视化作品的集合。"
  paper: "https://arxiv.org/pdf/2308.16053.pdf"
  demo: https://oldvis.github.io/gallery/
  highlight: 3



- id: asteroid
  title: Asteroid Visualization
  image: 18-asteroid.gif
  description: "We designed a visual analytics system for analyzing the impact of different asteroids."
  description_zh: "对多参数长时序的模拟数据进行渲染比较的可视分析系统。"
  paper: "http://vis.pku.edu.cn/research/publication/jov2020_event.pdf"
  video: /assets/project/2021_ asteroid.mp4


- id: bestview
  title: Best Viewpoint
  image: 19_bestview.png
  description: "We designed a deep learning-based method for volume rendering best view selection."
  description_zh: "基于深度学习的三维模拟数据体渲染最佳视角选取方法。"
  paper: "http://vis.pku.edu.cn/research/publication/JOV_dlbv_Changhe.pdf"

- id: fengshui-environment
  title: 藏风聚气
  image: fengshui-environment.png
  description: "A draggable village for exploring wind, sunlight, drainage, vegetation, and prospect-refuge as a modern environmental reading of feng shui."
  description_zh: "一座可以拖动的村庄：先观察风、雨、日照与庇护感如何改变居住环境，最后再理解传统风水术语产生的背景。"
  demo: "/projects/fengshui/"

- id: chinese-calculus
  title: 割之又割
  image: chinese-calculus.png
  description: "An interactive visual essay on ideas of exhaustion, approximation, accumulation, and volume in classical Chinese mathematics."
  description_zh: "从割、逼、积、合四个动作，体验刘徽与祖暅数学中的分割、逼近与等截面求积思想。"
  demo: "/projects/chinese-calculus/"

- id: chinese-calendar
  title: 观天授时
  image: chinese-calendar.png
  description: "An interactive time machine for discovering how the traditional Chinese lunisolar calendar coordinates lunar months, solar seasons, leap months, and the 24 solar terms."
  description_zh: "一部可以拖动的中国历法时间机器：从日、月、年出发，亲手发现置闰与二十四节气如何协调月相和季节。"
  demo: "/projects/chinese-calendar/"

- id: chinese-mathematics
  title: 未曾写下 x
  image: chinese-math.png
  description: "An interactive visual essay on equation thought in classical China: fangcheng elimination, the Heavenly Unknown, and the Four Unknowns."
  description_zh: "一场可操作的中国古代方程思想展：从《九章算术》的方程术，到天元术与《四元玉鉴》。"
  demo: "/projects/chinese-mathematics/"
  demo_en: "/projects/chinese-mathematics/en.html"

- id: yijing-first-principles
  title: 时与位
  image: yijing-first-principles.png
  description: "An interactive exploration of change, polarity, timing, position, the six stages of Qian, and the 64 hexagrams as first principles of the I Ching."
  description_zh: "一场关于变化的交互实验：拨动阴阳与生命周期，亲手理解时、位、乾卦六爻与六十四卦怎样描述变化中的判断。"
  demo: "/projects/yijing/"



