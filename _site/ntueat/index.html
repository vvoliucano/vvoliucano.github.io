  <script>
  function trim(str) {
    return str.replace(/^\s+|\s+$/g, '');
  }
  var headers = document.querySelectorAll("h2, h3, h4, h5, h6");
  for (var i=0; i<headers.length; i++) {
    var h = headers[i];
    var name = h.getAttribute("id");
    if (!name) continue;
    var title = h.innerHTML;
    h.innerHTML = '<a href="#' + name + '" class="anchor"><i class="fas fa-hashtag"></i></a>' + trim(title);
  }

  function toggleBibtex(id, button) {
    var element = document.getElementById('bib-' + id);
    if (!element) return;

    var isHidden = element.hasAttribute('hidden');
    if (isHidden) {
      element.removeAttribute('hidden');
    } else {
      element.setAttribute('hidden', '');
    }

    if (button) {
      button.setAttribute('aria-expanded', isHidden ? 'true' : 'false');
    }
  }

  function copyBibtex(id, button) {
    var codeElement = document.getElementById('bib-code-' + id);
    if (!codeElement) return;

    var text = codeElement.textContent;
    var resetLabel = function() {
      if (!button) return;
      button.innerHTML = '<i class="far fa-copy" aria-hidden="true"></i> Copy';
    };
    var setCopied = function() {
      if (!button) return;
      button.innerHTML = '<i class="fas fa-check" aria-hidden="true"></i> Copied';
      window.setTimeout(resetLabel, 1600);
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(setCopied).catch(function() {
        fallbackCopy(text, setCopied);
      });
      return;
    }

    fallbackCopy(text, setCopied);
  }

  function fallbackCopy(text, onSuccess) {
    var textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.setAttribute('readonly', '');
    textarea.style.position = 'absolute';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();

    try {
      document.execCommand('copy');
      if (onSuccess) onSuccess();
    } finally {
      document.body.removeChild(textarea);
    }
  }

  var languageChoices = document.querySelectorAll('[data-language-choice]');
  for (var languageIndex = 0; languageIndex < languageChoices.length; languageIndex++) {
    languageChoices[languageIndex].addEventListener('click', function() {
      try {
        window.localStorage.setItem('site-language', this.getAttribute('data-language-choice'));
      } catch (error) {
        // The link still works when storage is unavailable.
      }
    });
  }
</script>
