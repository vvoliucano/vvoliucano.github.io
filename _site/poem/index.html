<style>
@font-face {
    font-family: "OuyangxunKaishu";
    src: url("/assets/font/%E6%AD%A3%E6%AC%A7%E9%98%B3%E8%AF%A2%E6%A5%B7%E4%B9%A6%2B%E7%AE%80%E7%B9%81.TTF") format("truetype");
    font-display: swap;
}

.poem-detail-page {
    max-width: 1140px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
    --poem-font-main: "OuyangxunKaishu", "STKaiti", "KaiTi", "Kaiti SC", serif;
    --poem-font-note: "STFangsong", "FangSong", "华文仿宋", "FangSong_GB2312", serif;
    --poem-paper: #fbf8f1;
    --poem-paper-deep: #f0e8da;
    --poem-ink: #25384a;
    --poem-muted: #786851;
    --poem-rule: rgba(130, 99, 58, 0.26);
}

.poem-detail-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
}

.poem-detail-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.7rem;
}

.poem-detail-link {
    display: inline-block;
    padding: 0.1rem 0.2rem;
    color: #5a4a34;
    text-decoration: none;
    font-family: var(--poem-font-main);
    font-size: 1.05rem;
    letter-spacing: 0.08em;
    border-bottom: 1px solid rgba(121, 101, 71, 0.18);
    transition: color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
}

.poem-detail-link:hover {
    color: #392d1f;
    border-color: rgba(121, 101, 71, 0.44);
    transform: translateY(-1px);
}

.poem-detail-card {
    background: transparent;
    border: 0;
    border-radius: 0;
    box-shadow: none;
    overflow: visible;
}

.poem-detail-body {
    position: relative;
    padding: 1.1rem 1.25rem 1.8rem;
    max-width: 980px;
    margin: 0 auto;
}

.poem-sheet-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 0.5rem;
    scroll-behavior: smooth;
    width: 100%;
    text-align: center;
}

.poem-sheet-scroll::-webkit-scrollbar {
    height: 10px;
}

.poem-sheet-scroll::-webkit-scrollbar-thumb {
    background: rgba(121, 101, 71, 0.22);
    border-radius: 999px;
}

.poem-sheet {
    position: relative;
    display: inline-block;
    width: max-content;
    min-width: 100%;
    box-sizing: border-box;
    padding: 1.8rem 2.2rem;
    border-radius: 6px;
    border: 1px solid rgba(145, 121, 86, 0.16);
    background:
        linear-gradient(180deg, rgba(255, 251, 244, 0.72), rgba(249, 241, 225, 0.92)),
        repeating-linear-gradient(
            0deg,
            rgba(110, 87, 53, 0.018) 0px,
            rgba(110, 87, 53, 0.018) 1px,
            rgba(255, 255, 255, 0) 2px,
            rgba(255, 255, 255, 0) 6px
        ),
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.48), transparent 28%),
        radial-gradient(circle at 78% 72%, rgba(190, 160, 112, 0.12), transparent 36%),
        linear-gradient(180deg, var(--poem-paper) 0%, #f7f2e8 100%);
    box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.38),
        0 10px 26px rgba(84, 57, 27, 0.08);
    overflow: hidden;
}

.poem-sheet-paper-wrap {
    position: absolute;
    inset: -2px;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 6px;
}

.poem-sheet-paper {
    display: block;
    width: 100%;
    height: 100%;
    opacity: 0.48;
    mix-blend-mode: multiply;
}

.poem-sheet-content {
    position: relative;
    z-index: 1;
}

.poem-sheet-hint {
    position: absolute;
    top: 0.1rem;
    right: 1.6rem;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.2rem 0.55rem;
    color: rgba(96, 78, 54, 0.78);
    font-family: var(--poem-font-main);
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    background: linear-gradient(90deg, rgba(255, 252, 246, 0), rgba(255, 252, 246, 0.9), rgba(255, 252, 246, 0));
    pointer-events: none;
    transition: opacity 0.2s ease;
}

.poem-sheet-hint::before,
.poem-sheet-hint::after {
    content: "";
    width: 1.6rem;
    height: 1px;
    background: linear-gradient(90deg, rgba(123, 98, 67, 0), rgba(123, 98, 67, 0.55));
}

.poem-sheet-hint::after {
    transform: scaleX(-1);
}

.poem-sheet::before,
.poem-sheet::after {
    content: "";
    position: absolute;
    top: 1rem;
    bottom: 1rem;
    width: 2px;
    background: linear-gradient(180deg, rgba(167, 47, 37, 0.18), rgba(167, 47, 37, 0.34), rgba(167, 47, 37, 0.18));
}

.poem-sheet::before {
    right: 1.15rem;
}

.poem-sheet::after {
    left: 1.15rem;
}

.poem-sheet-titleblock {
    position: absolute;
    top: 1.65rem;
    right: 1.95rem;
    color: var(--poem-ink);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.35rem;
}

.poem-sheet-footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 0.42rem;
    padding: 0 0.05rem 0.05rem 0.05rem;
    min-width: 4.8rem;
    flex: 0 0 auto;
    align-self: flex-end;
}

.poem-sheet-signature {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-family: var(--poem-font-main);
    color: rgba(78, 60, 40, 0.88);
    font-size: 1.05rem;
    letter-spacing: 0.1em;
    line-height: 1.55;
}

.poem-sheet-qr {
    display: block;
    margin-top: 0.1rem;
}

.poem-qr-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}

.poem-qr-frame {
    padding: 0;
    background: transparent;
    border: 0;
    border-radius: 0;
    box-shadow: none;
}

.poem-qr-canvas {
    display: block;
    width: 68px;
    height: 68px;
}

.poem-sheet-title {
    font-family: var(--poem-font-main);
    font-size: 2rem;
    line-height: 1.25;
    letter-spacing: 0.14em;
    writing-mode: vertical-rl;
    text-orientation: mixed;
}

.poem-sheet-meta {
    font-size: 0.86rem;
    line-height: 1.2;
    color: var(--poem-muted);
    letter-spacing: 0.08em;
    writing-mode: horizontal-tb;
}

.poem-sheet-body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 0.35rem;
    min-height: 0;
    padding: 0.6rem 4.9rem 0.6rem 0.9rem;
    width: max-content;
    min-width: calc(100% - 5.8rem);
    box-sizing: border-box;
}

.poem-lines {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-family: var(--poem-font-main);
    color: var(--poem-ink);
    font-size: 2.1rem;
    line-height: 1.8;
    letter-spacing: 0.12em;
}

.poem-line {
    position: relative;
    white-space: nowrap;
    padding: 0 0.42rem;
    min-width: 3.3rem;
}

.poem-line-text {
    position: relative;
    display: inline-block;
    color: rgba(37, 56, 74, 0.92);
    opacity: 0.96;
    text-shadow: 0 0 0.18px rgba(24, 38, 52, 0.22);
}

.poem-exporting .poem-line-text {
    color: rgba(37, 56, 74, 0.94);
    text-shadow: none;
}

.poem-exporting .poem-sheet-title,
.poem-exporting .poem-sheet-signature {
    color: rgba(37, 56, 74, 0.94);
    text-shadow: none;
}

.poem-line::before,
.poem-line::after {
    content: "";
    position: absolute;
    top: 0.2rem;
    bottom: 0.2rem;
    width: 1px;
    background: var(--poem-rule);
}

.poem-line::before {
    right: 0;
}

.poem-line::after {
    left: 0;
}

.poem-divider {
    min-width: 1.45rem;
}

.poem-spacer {
    min-width: 1.45rem;
}

.poem-divider::before,
.poem-divider::after,
.poem-spacer::before,
.poem-spacer::after {
    display: none;
}

.poem-supporting {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 1rem;
    padding: 0 1.6rem 1.8rem;
    max-width: 980px;
    margin: 0 auto;
}

.poem-download-bar {
    max-width: 980px;
    margin: 0 auto 1.1rem;
    padding: 0 1.6rem;
    display: flex;
    justify-content: flex-end;
}

.poem-download-button {
    border: 0;
    background: none;
    cursor: pointer;
}

.poem-panel {
    background: rgba(255, 251, 243, 0.86);
    border: 1px solid rgba(145, 121, 86, 0.12);
    border-radius: 14px;
    padding: 1.15rem 1.2rem;
}

.poem-panel-title {
    margin: 0 0 0.8rem;
    color: #5e4d36;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.12em;
}

.poem-notes-list {
    margin: 0;
    padding-left: 0;
    color: #4f5e6a;
    line-height: 1.9;
    list-style: none;
    font-family: var(--poem-font-note);
}

.poem-note-line + .poem-note-line {
    margin-top: 0.65rem;
}

.poem-notes-list a {
    word-break: break-word;
}

.poem-images {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
}

.poem-images a {
    display: block;
    width: 100%;
}

.poem-images img {
    width: min(100%, 940px);
    height: auto;
    border-radius: 12px;
    display: block;
    margin: 0 auto;
    box-shadow: 0 10px 22px rgba(52, 36, 18, 0.12);
}

.poem-empty {
    padding: 3rem 2rem;
    text-align: center;
    color: #607286;
}

.poem-empty h1 {
    margin-top: 0;
    font-weight: 500;
    color: #23384e;
}

.poem-empty ul {
    list-style: none;
    padding: 0;
    margin: 1.5rem 0 0;
}

.poem-empty li + li {
    margin-top: 0.6rem;
}

@media (max-width: 900px), (orientation: portrait) {
    .poem-detail-toolbar {
        gap: 0.7rem;
    }

    .poem-detail-nav {
        gap: 0.65rem;
    }

    .poem-detail-link {
        font-size: 1.32rem;
        line-height: 1.55;
    }

    .poem-detail-body {
        padding: 0.9rem 0.45rem 1rem;
    }

    .poem-supporting {
        padding: 0 0.45rem 1.2rem;
    }

    .poem-download-bar {
        padding: 0 0.45rem;
        margin-bottom: 0.9rem;
    }

    .poem-sheet {
        min-width: 100%;
        padding: 1rem 1.1rem;
    }

    .poem-sheet-titleblock {
        top: 0.95rem;
        right: 1.05rem;
    }

    .poem-qr-canvas {
        width: 58px;
        height: 58px;
    }

    .poem-sheet-signature {
        font-size: 0.96rem;
    }

    .poem-sheet-title {
        font-size: 1.8rem;
    }

    .poem-sheet-meta {
        font-size: 0.9rem;
    }

    .poem-sheet-body {
        min-height: 0;
        padding: 0.35rem 3.9rem 0.35rem 0.35rem;
        height: auto !important;
    }

    .poem-sheet-footer {
        min-width: 4.6rem;
        gap: 0.32rem;
    }

    .poem-lines {
        font-size: 1.95rem;
        line-height: 1.72;
        letter-spacing: 0.1em;
    }

    .poem-line {
        min-width: 3.1rem;
        padding: 0 0.34rem;
    }

    .poem-sheet-hint {
        right: 0.7rem;
        font-size: 0.82rem;
    }

    .poem-notes-list {
        font-size: 1.9rem;
        line-height: 2.05;
    }
}

@media (max-width: 600px), (max-aspect-ratio: 1/1) {
    .poem-detail-toolbar {
        gap: 0.6rem;
    }

    .poem-detail-nav {
        gap: 0.55rem;
    }

    .poem-detail-link {
        font-size: 1.45rem;
        line-height: 1.5;
    }

    .poem-detail-body {
        padding: 0.55rem 0.15rem 0.8rem;
    }

    .poem-supporting {
        gap: 0.85rem;
        padding: 0 0.15rem 1rem;
    }

    .poem-download-bar {
        padding: 0 0.15rem;
    }

    .poem-sheet {
        min-width: 100%;
        padding: 0.7rem 0.75rem;
    }

    .poem-sheet-titleblock {
        top: 0.62rem;
        right: 0.72rem;
    }

    .poem-qr-frame {
        padding: 0.25rem;
    }

    .poem-qr-canvas {
        width: 46px;
        height: 46px;
    }

    .poem-sheet-footer {
        gap: 0.28rem;
        padding-left: 0.05rem;
        min-width: 3.8rem;
    }

    .poem-sheet-signature {
        font-size: 0.88rem;
    }

    .poem-sheet-title {
        font-size: 2.45rem;
    }

    .poem-sheet-body {
        padding: 0.1rem 4.9rem 0.1rem 0.05rem;
        height: auto !important;
    }

    .poem-lines {
        font-size: 2.8rem;
        line-height: 1.52;
        letter-spacing: 0.08em;
    }

    .poem-line {
        min-width: 4.15rem;
        padding: 0 0.38rem;
    }

    .poem-sheet-hint {
        right: 0.35rem;
        font-size: 1rem;
    }

    .poem-panel {
        padding: 1rem 0.95rem;
    }

    .poem-panel-title {
        font-size: 1.9rem;
    }

    .poem-notes-list {
        font-size: 2.65rem;
        line-height: 1.95;
    }

    .poem-note-line + .poem-note-line {
        margin-top: 1.4rem;
    }

    .poem-download-button {
        font-size: 1.45rem;
    }
}
</style>

<svg aria-hidden="true" width="0" height="0" style="position:absolute;left:-9999px;overflow:hidden">

    <filter id="roughpaper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.050" result="noise" numOctaves="25"></feTurbulence>
      <feDiffuseLighting in="noise" lighting-color="#FBF8F1" surfaceScale="0.88">
        <feDistantLight azimuth="24" elevation="46"></feDistantLight>
      </feDiffuseLighting>
    </filter>
  </defs>
</svg>

<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  id="poem-page"
  data-poem-base-url="/poem/"

  data-poetry-asset-base="/assets/poetry/"
  data-font-url="/assets/font/%E6%AD%A3%E6%AC%A7%E9%98%B3%E8%AF%A2%E6%A5%B7%E4%B9%A6%2B%E7%AE%80%E7%B9%81.TTF"
>

  </div>

<script id="poem-data" type="application/json">[{"id":"nanyang","title":"天净沙·旧坊","year":2026,"type":["词"],"content":["孤坊野树骄阳","河湟隔断他乡","舞袖车薪尽囊","春风化烬","旧庠无识炎黄"],"highlight":3,"image":["202604_nanyang_0.jpg","202604_nanyang_1.jpg","202604_nanyang_2.png","202604_nanyang_3.jpg","202604_nanyang_4.png","202604_nanyang_5.jpg","202604_nanyang_6.jpg","202604_nanyang_7.jpg"],"description":["1. 《天净沙·旧坊》，以物伤逝，将南洋大学旧牌坊与南洋华人百年来维系文化血脉的历史交织在一起。","2. 孤坊野树宵凉。昔日连接裕廊大路与南洋大学校园入口的南大牌坊，如今被高速公路和住宅区割裂，孤零零地矗立在荒野之中。隐喻了这段历史被刻意遗忘（如今南洋理工大学云南园内的仅为其仿品）。","3. 舞袖车薪尽囊。“舞袖”代指当时义舞筹款捐款的舞女，“车薪”不仅指杯水车薪的微薄收入，也直指当时的拉车夫。为了建立一所漢语为媒介的大学，南洋各界华人，不论是富商，还是车夫与舞女，皆踊跃捐款。展现了南洋华人在逆境求存时表现出的凝聚力。"]},{"id":"临江仙","title":"临江仙·东风西逝","year":2025,"type":["词"],"content":["漢骑封大漠，单于西遁","​帝鞭锋自长安出","​君不达今何佩斯？风卷旧袍","---","​金殿议连宵，棋局各营","​东墙薪尽西邻豪","​危桥独倚看断缆，多瑙河凉"],"highlight":3,"image":["202511_budapest_0.jpg","202511_budapest_1.jpg"],"description":["1. 临江仙·东风西逝，以古喻今，将中国汉朝的历史与现代欧洲多瑙河畔的布达佩斯巧妙地串联起来。“东风西逝”既指古代匈奴在汉朝打击下西迁的历史长风，也暗指当今世界格局的变迁与地缘政治的激荡。","2. 汉骑封大漠，单于西遁。帝鞭锋自长安出。起笔气势恢宏，回溯历史：汉朝铁骑大破匈奴，迫使单于西遁。这股来自长安的锋芒，犹如一条历史的长鞭，引发了亚欧大陆的民族大迁徙。同时，“帝鞭”暗指历史上令欧洲震颤的“上帝之鞭”（常指匈人首领阿提拉，其与匈牙利有深厚历史渊源），在此化作一件曾震撼时代的绝世武器。[古基因组揭示欧洲匈人与汉匈奴帝国之间的跨欧亚联系，美国科学院院刊（PNAS），2025。](https://www.pnas.org/doi/epub/10.1073/pnas.2418485122)","3. 君不达今何佩斯？风卷旧袍。此句为全词“诗眼”，将地名与长句完美融合，极尽双关之妙。字面上，“不达”与“佩斯”合成了词人身处的匈牙利首都“布达佩斯”（Budapest）。深层意理上，则是对前句“帝鞭”的沉重叩问：“你若不解这千年变局，试问今日还有谁配执掌、佩戴这把历史的利刃？”（何佩斯：谁来佩戴此物）。“风卷旧袍”写尽千年流转，昔日战袍在异国冷风中翻涌的沧桑感。","4. 金殿议连宵，棋局各营。下阕切入现代欧陆局势。“金殿”指代多瑙河畔金碧辉煌的国会大厦或各类峰会。政客连夜争辩，而整个欧陆早已化作多方博弈的庞大棋局。此句隐写了当下错综复杂的大国拉扯：既有欧陆内部东西利益的错位与倾轧（如劳动力的西倾），也有横亘在欧洲的巨大地缘冲突；更有域外执棋者在背后推波助澜，借力打力，既消耗对手，也削弱盟友。各方同处一局，却阵营壁垒分明，算计重重。","5. 东墙薪尽西邻豪。此句反向化用“薪不尽，火不灭”之理，暗示维持某种对抗或繁荣的资源（如能源、资本乃至国力）正在被急剧消耗甚至枯竭（东墙薪尽），而隔壁的阵营或大国却依然高歌猛进、大发其财（西邻豪）。在宏大博弈中，一方的透支往往成为另一方敛财与控制的筹码，道尽了被当作耗材者的悲哀。","6. 危桥独倚看断缆，多瑙河凉。收尾将视线拉回眼前的具象。“危桥”与“断缆”既是布达佩斯跨河大桥的实景，更是深沉的时代隐喻。“危桥”指代东西方之间摇摇欲坠的沟通纽带；“断缆”不仅象征着世界格局的撕裂、脱钩，更隐喻了那条沉入深海、被强行切断的能源大动脉（暗指“北溪”管道被炸毁等断链事件）。词人独倚桥头，望着冰冷的多瑙河水，体会着大时代下世界割裂的阵痛与刺骨的寒意。"]},{"id":"云径","title":"云径","year":2025,"type":["诗"],"content":["远上云中径，烟树绕九溪","枫香星影碎，浅潭一叶栖"],"highlight":3,"image":["2025_yunxi_1.jpg","2025_yunxi_2.jpg","2025_yunxi_3.jpg"]},{"id":"河池","title":"河池","year":2025,"type":["诗"],"content":["山影随舟远，河池纳天光","​云峰高斯立，风抚一江芳","​千仞虽无欲，清流自皴霞","汀漳本同襟，何故穿龙岩"],"highlight":3,"image":["2025_hechi_1.jpg","2025_hechi_2.jpg","2025_hechi_3.jpg"]},{"id":"天下","title":"江城子·天下首见","year":2025,"type":["词"],"content":["三百万里唱旧伤，舰犁浪，箭穿杨","鹰帜猎猎，邀吾征东方?!","六十四屯沉渊处， 涛犹泣，血未凉","---","桦林犹诉昔年殇，齿唇依？耻先忘","把酒言欢，何安岭平疆?","愿得飞将重靖宇，巡北斗，护龙江!"],"highlight":3},{"id":"赠载煜","title":"赠载煜","year":2025,"type":["诗"],"content":["朝日煜海东","南洋载星舟","异域自同俦","古道共悠悠"],"highlight":3},{"id":"作客","title":"苏幕遮·万里作客","year":2025,"type":["词"],"content":["越鲸涛，开筚路。七剑星舟，直破沧溟雾。","山海沧茫寻生处，织就蓬莱，竹网连天幕。","---","赤旗张，烽火怒。剑指崖山，万里衣冠渡。","谁道河殇湮夏土？天海扬帆，银汉为归路。"],"highlight":3,"description":["1. 七剑星舟：指七下西洋","2. 竹网：竹网参见维基百科"]},{"id":"阴晴","title":"阴晴","year":2025,"type":["诗"],"content":["阴晴原无定，海气幻千形","晴峦分翠霭，雨壑坠珠泠"],"highlight":3},{"id":"越山海","title":"越山海","year":2024,"type":["诗"],"content":["志合山海越，千里复相逢","​星汉光年远？倏如一江风"],"highlight":3},{"id":"首尾两端","title":"江城子·首尾两端","year":2024,"type":["词"],"content":["岷江千里雪融寒，玉磊盘，青城拦","太守作堰，鱼嘴妙分澜","秦卷天下终始汉，丞相挽，万古昙;","---","天堑横亘龙虎桓，三代传，守江南","大魏吴王，十万雄师磐","白衣渡江千古传，明祖赞，护陵南。"],"highlight":3,"description":["1. 江城子·首尾两端，江城子是著名的词牌，首尾两端正好是长江的西边和东边的两座江城的对比。在古代岷江一般被认为是长江的主脉。","2. 岷江千里雪融寒，玉磊盘，青城拦。岷江发源于高山雪域，雪水融化而下，奔流千里。玉磊山与青城山夹峙其间，形成天然的水势格局。此三句先写自然地理，以铺垫都江堰工程产生的条件。岷江之水既是灾患之源，也是蜀地农业的命脉。","3. “太守”指秦蜀郡太守李冰。李冰父子主持修建都江堰水利工程，以“鱼嘴”分水，使江水分流灌溉平原、又能泄洪导流。此举不仅解决水患，更使成都平原成为沃野千里，从而奠定蜀地富庶的基础。","4. 蜀地富庶成为秦国统一六国的重要物质基础之一。秦灭六国之后，中国进入大一统时代；而汉朝的兴起亦与蜀地有关, 刘邦曾受封汉中王，以巴蜀为根基发展势力。至三国之时，汉室最后的政权亦立于巴蜀。故言“终始汉”，既指汉室从蜀地兴起，也暗示其最终在蜀地延续。","5. 丞相挽，万古昙。“丞相”指诸葛亮。诸葛亮辅佐蜀汉、整顿内政、北伐中原，以一人之力维系国运。“挽”有挽狂澜之意。蜀汉虽国祚不长，但诸葛亮的政治理想与声名却流传千古，成为中国乃至东亚的精神支柱。","6. 天堑横亘龙虎桓，三代传，守江南。下阕转写江东。长江天险横亘南北，使江东形势险固，自古有“龙盘虎踞”之称。东吴传至孙权是第三代，政权稳固。然而其势力始终局限于江南地区，未能改变天下格局，故言“守江南”。不思进取却又左右横跳，背刺盟友，属实可恨。","7. 大魏吴王，十万雄师磐。孙权曾向曹丕称臣受封吴王，后又自立为帝。“十万雄师”写其兵力强盛，后世尊称孙权为“孙十万”。","8. 白衣渡江千古传。指东吴将领吕蒙伪装商旅偷袭荆州的事件，即白衣渡江。此举在军事上极为成功，但破坏了政治底线。","9. 明祖赞，护陵南。“明祖”指朱元璋。相传明太祖修建明孝陵时，见孙权陵说：“孙权也是好汉子，就留他守门吧。”表面为称赞，实则将一位开国之君降格为守陵武将。"]},{"id":"西山","title":"西山","year":2024,"content":["五岭赴平川，西乡享景山","太行横燕脉，淑贤如是观"],"image":["202410_hutoushan.jpg","202410_hutoushan2.jpg","202410_hutoushan3.jpg"]},{"id":"二王千秋","title":"二王千秋","year":2024,"content":["岷江千里雪，携势冲巴蜀","无坝沙水分，穷塞开天府","宝瓶百丈深，灌溉千万亩","二王千秋利，丞相守汉土"],"image":["2024_erwang1.jpg","2024_erwang2.jpg","2024_erwang3.jpg"]},{"id":"东吴大帝","title":"东吴大帝","year":2024,"content":["东吴大帝垂宇宙","虎踞龙盘守江东","皇明太祖赞好汉","留得钟山护皇陵","魏武扬鞭止荆扬","生子当如魏吴王","厉兵秣马提十万","北望合肥又一年"]},{"id":"纳猫契","title":"纳猫契","year":2023,"content":["一只猫儿是狸花，本在西方诸佛前。","三藏带归家长养，护持经卷在民间。","外表俊俏身世妙，身具虎斑神似豹。","藏于豹溪孤慎行，碰瓷南武第一侯。","豹溪小豹是某甲，自卖南武终不悔。","三面断价小鱼干，聘金随契已交还。","买主愿如石崇富，寿如彭祖福高迁。","仓禾自此巡无怠，鼠贼从兹补不闲。","不吵主人睡懒觉，不得盗食把家翻。","日夜在家看守物，莫走东畔与西边。","如有故违走外去，堂前引过受笞鞭。","十月初七，行契人灿。行契喵豹"],"image":["202412_xiaobao_qiyue.jpg"],"description":["1. Na Mao Qi was a ritualized cat adoption contract in ancient China, especially during the Song dynasty. It recorded the cat’s information, the adopter’s expectations and responsibilities, and was accompanied by symbolic gifts and formal rituals. The contract symbolically treated the cat as a family member, with a promise of kind treatment, in the hope that the cat would protect the household and bring good fortune.","2. The spiral layout of the Na Mao Qi owes thanks to the assistance of Dr. Crab (shellywhen.github.io)."]},{"id":"四海一同","title":"三星四海","year":2023,"content":["三星伴月堆，西山俯岷江","古蜀三千年，隔绝殷与商","开明毕于旦，始皇卷八方","悠悠华夏同，四海同一邦"]},{"id":"未名","title":"未名","year":2022,"type":["绝句"],"content":["日暮长天亮，闲云镜里悠","九衢含朗润，幽径未名由"],"highlight":3},{"id":"蛙声慢","title":"蛙声慢","year":2022,"content":["云蒸炎铄石","骤雨安步归","听取蛙声慢?","东风万树飞"]},{"id":"八荒同","title":"卜算子·八荒同","year":2022,"content":["歇山盖穹窿","庭镇红星升","敢效昔年三武事，从此和平道","鱼雷荡水波","天海无需祭","十亿神州尽文殊，玛米金珠降"]},{"id":"妙峰","title":"如梦令·妙峰观日","year":2021,"content":["气盛轻年意至","不惧风寒夜路","残月伴微灯","直上京西首峭","凝眺","凝眺","红霞穿楼万丈"]},{"id":"万生","title":"万生","year":2020,"type":["绝句"],"content":["凉风嘻群木，暖月映同伦","绝顶万生瞰，千檐若素尘"],"highlight":3},{"id":"返校","title":"卜算子·返校","year":2020,"type":["词"],"content":["庚子岁月停，疫始江山锁。","谁话平川不是水？云雾生梁野。","---","南武留连时，飞信催人返。","应是别离了无憾，我驾白驹启。"],"highlight":3},{"id":"卷","title":"卷","year":2020,"type":"新绝句","content":["四九千层卷","八千拓扑一 (TOP 1)","难为人上人","就做恩批西 (NPC)"]},{"id":"秋","title":"秋","year":2020,"type":"绝句","content":["极目遥天净","山深秋水凉","苍苍翠微辟","朱门石径旁"]},{"id":"冲浪","title":"浪淘沙·真的在浪淘沙","year":2020,"type":["诗"],"content":["波涌青蓝浪起白","驭梭踏浪牧仆潮","人生浮表难平意","应上清玄揽月来"],"highlight":3},{"id":"三琼","title":"三琼","year":2020,"type":["新绝句"],"content":["两日踏三琼","半天寻万水","酒头起飞对","车上来蹦迪"]},{"id":"如梦令·明天开始洗心革面好好干活","title":"如梦令·明天开始洗心革面好好干活","year":2020,"type":["词"],"content":["愧忆京师经笥，夜夜焚膏继晷","从鹭岛归来，又上酒桌催吐","闲浪，闲浪","何日才能毕业?"],"highlight":3},{"id":"对联","title":"永平万安","year":2020,"type":["联"],"content":["上：平川梁野皆春色","下：高湖汉家尽东风","横：永平万安"],"highlight":3},{"id":"武平","title":"南武赋","year":2017,"content":["川平驷马阔，山野梁上悬。","湖湘漫汉水，溪桃引楚山。","千岭赴南海，万泾始东流。","望象洞，庭内十方远。","观狮山，岩前龙虎酣。","山中衫方青，坝下柭更切。","小兰贵趣雅，大禾乐仓箱。","梧高栖凤，堡中潜龙。","望良政，保永平。","盼善民，主万安。"],"highlight":3}]</script>
<script>
const poemPage = document.getElementById('poem-page');
const poemDataNode = document.getElementById('poem-data');
const poems = poemDataNode ? JSON.parse(poemDataNode.textContent) : [];
const poemBaseUrl = poemPage ? poemPage.dataset.poemBaseUrl : '/poem/';
const otherPageUrl = poemPage ? poemPage.dataset.otherPageUrl : '/mushan/';
const poetryAssetBase = poemPage ? poemPage.dataset.poetryAssetBase : '/assets/poetry/';

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getPoemId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

function normalizeList(value) {
  if (!value) return [];
  return Array.isArray(value) ? value : [value];
}

function renderMarkdownLine(text) {
  let html = escapeHtml(text);
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  html = html.replace(/&lt;(https?:\/\/[^&]+)&gt;/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
  return html;
}

function getContentEntries(lines) {
  return normalizeList(lines).map((line) => {
    const text = String(line == null ? '' : line);
    const stripped = text.trim();
    if (!stripped) {
      return { type: 'spacer', text: '' };
    }
    if (stripped === '---') {
      return { type: 'divider', text: '' };
    }
    return { type: 'text', text };
  });
}

function buildContent(lines) {
  return getContentEntries(lines).map((entry) => {
    if (entry.type === 'spacer') return '<div class="poem-line poem-spacer" aria-hidden="true"></div>';
    if (entry.type === 'divider') return '<div class="poem-line poem-divider" aria-hidden="true"></div>';
    return `<div class="poem-line"><span class="poem-line-text">${escapeHtml(entry.text)}</span></div>`;
  }).join('');
}

function estimatePoemHeight(entries) {
  const textEntries = entries.filter((entry) => entry.type === 'text');
  if (!textEntries.length) return 420;
  const charCounts = textEntries.map((entry) => Array.from(entry.text).length);
  const maxChars = Math.max(...charCounts, 8);
  return Math.max(320, Math.min(860, maxChars * 42 + 90));
}

function convertYearToSeal(year) {
  const map = {
    '0': '零',
    '1': '壹',
    '2': '贰',
    '3': '叁',
    '4': '肆',
    '5': '伍',
    '6': '陆',
    '7': '柒',
    '8': '捌',
    '9': '玖',
  };
  return String(year || '').split('').map((digit) => map[digit] || digit).join('');
}

function buildReading(poem) {
  const qrUrl = `https://liucan.me/poem/?id=${encodeURIComponent(poem.id || '')}`;
  const sealYear = convertYearToSeal(poem.year);
  return `
    <div class="poem-sheet-hint" id="poem-scroll-hint">左右滑动</div>
    <div class="poem-sheet-scroll">
      <div class="poem-sheet">
        <div class="poem-sheet-paper-wrap" aria-hidden="true">
          <svg class="poem-sheet-paper" preserveAspectRatio="none" viewBox="0 0 100 100">
            <rect x="0" y="0" width="100" height="100" fill="#fbf8f1" filter="url(#roughpaper)"></rect>
          </svg>
        </div>
        <div class="poem-sheet-content">
          <div class="poem-sheet-titleblock">
            <div class="poem-sheet-title">${escapeHtml(poem.title || poem.id)}</div>
          </div>
          <div class="poem-sheet-body">
            <div class="poem-sheet-footer">
              <div class="poem-sheet-signature">${escapeHtml(sealYear)}年 作</div>
              <div class="poem-sheet-qr">
                <a class="poem-qr-link" id="poem-qr-link" href="${qrUrl}" target="_blank" rel="noopener noreferrer">
                  <span class="poem-qr-frame">
                    <canvas class="poem-qr-canvas" id="poem-qr-canvas" width="172" height="172"></canvas>
                  </span>
                </a>
              </div>
            </div>
            <div class="poem-lines">
              ${buildContent(poem.content)}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function buildNotes(description) {
  const notes = normalizeList(description);
  if (!notes.length) return '';
  const items = notes.map((line) => `<div class="poem-note-line">${renderMarkdownLine(String(line))}</div>`).join('');
  return `
    <section class="poem-panel">
      <h2 class="poem-panel-title">注释</h2>
      <div class="poem-notes-list">${items}</div>
    </section>
  `;
}

function buildImages(images, title) {
  const imageList = normalizeList(images);
  if (!imageList.length) return '';
  const items = imageList.map((img) => {
    const src = `${poetryAssetBase}${img}`;
    return `<a href="${src}" target="_blank" rel="noopener noreferrer"><img src="${src}" alt="${escapeHtml(title)}" /></a>`;
  }).join('');
  return `
    <section class="poem-panel">
      <h2 class="poem-panel-title">配图</h2>
      <div class="poem-images">${items}</div>
    </section>
  `;
}

function buildMeta(poem) {
  const parts = [];
  if (poem.year) parts.push(`${poem.year}`);
  const type = normalizeList(poem.type).join(' · ');
  if (type) parts.push(type);
  return parts.join(' · ');
}

function poemUrl(id) {
  return `${poemBaseUrl}?id=${encodeURIComponent(id)}`;
}

function otherItemUrl(id) {
  return `${otherPageUrl}#${encodeURIComponent(id)}`;
}

function renderNotFound(root) {
  const sampleLinks = poems.slice(0, 8).map((poem) => {
    return `<li><a href="${poemUrl(poem.id)}">${escapeHtml(poem.title || poem.id)}</a></li>`;
  }).join('');

  root.innerHTML = `
    <div class="poem-empty">
      <h1>没有找到对应诗词</h1>
      <p>请从诗集列表重新进入，或直接选择一首浏览。</p>
      <ul>${sampleLinks}</ul>
    </div>
  `;
  document.title = '未找到诗词';
}

function renderPoem(root, poem, index) {
  root.innerHTML = `
    <article>
      <div class="poem-detail-body">
        ${buildReading(poem)}
      </div>
      <div class="poem-download-bar">
        <button type="button" class="poem-detail-link poem-download-button" id="poem-download-button">下载</button>
      </div>
      <div class="poem-supporting">
        ${buildNotes(poem.description)}
        ${buildImages(poem.image, poem.title || poem.id)}
      </div>
    </article>
  `;

  const backToItem = document.getElementById('poem-back-to-item');
  if (backToItem) {
    backToItem.href = otherItemUrl(poem.id);
  }

  const prevNext = document.getElementById('poem-prev-next');
  if (prevNext) {
    const links = [];
    if (index > 0) {
      const prev = poems[index - 1];
      links.push(`<a class="poem-detail-link" href="${poemUrl(prev.id)}">上一首</a>`);
    }
    if (index < poems.length - 1) {
      const next = poems[index + 1];
      links.push(`<a class="poem-detail-link" href="${poemUrl(next.id)}">下一首</a>`);
    }
    prevNext.innerHTML = links.join('');
  }

  const qrCanvas = document.getElementById('poem-qr-canvas');
  if (qrCanvas && typeof QRious === 'function') {
    new QRious({
      element: qrCanvas,
      value: `https://vvoliucano.github.io/poem/?id=${encodeURIComponent(poem.id || '')}`,
      size: 172,
      level: 'M',
      foreground: '#8b2c24',
      background: 'transparent',
      padding: 10,
    });
  }

  const scrollBox = root.querySelector('.poem-sheet-scroll');
  const scrollHint = root.querySelector('#poem-scroll-hint');
  if (scrollBox) {
    requestAnimationFrame(() => {
      scrollBox.scrollLeft = scrollBox.scrollWidth;
      if (scrollHint && scrollBox.scrollWidth <= scrollBox.clientWidth + 8) {
        scrollHint.style.opacity = '0';
      }
    });

    scrollBox.addEventListener('scroll', () => {
      if (!scrollHint) return;
      const maxOffset = scrollBox.scrollWidth - scrollBox.clientWidth;
      if (maxOffset <= 8) {
        scrollHint.style.opacity = '0';
        return;
      }
      const nearRight = scrollBox.scrollLeft >= maxOffset - 12;
      scrollHint.style.opacity = nearRight ? '1' : '0.18';
    }, { passive: true });
  }

  const downloadButton = document.getElementById('poem-download-button');
  if (downloadButton) {
    downloadButton.addEventListener('click', async () => {
      const sheet = root.querySelector('.poem-sheet');
      const hint = root.querySelector('#poem-scroll-hint');
      if (!sheet || typeof html2canvas !== 'function') return;

      const previousHintOpacity = hint ? hint.style.opacity : '';
      if (hint) hint.style.opacity = '0';
      downloadButton.disabled = true;
      downloadButton.textContent = '生成中...';

      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));

        const canvas = await html2canvas(sheet, {
          backgroundColor: null,
          scale: Math.min(3, window.devicePixelRatio || 2),
          useCORS: true,
          logging: false,
          onclone: (clonedDocument) => {
            const clonedSheet = clonedDocument.querySelector('.poem-sheet');
            if (clonedSheet) {
              clonedSheet.classList.add('poem-exporting');
            }
          },
        });

        const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
        if (!blob) return;

        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${poem.id || 'poem'}.png`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        downloadButton.textContent = '下载 PNG';
      } catch (error) {
        console.error(error);
        downloadButton.textContent = '下载失败';
        setTimeout(() => {
          downloadButton.textContent = '下载 PNG';
        }, 1200);
      } finally {
        downloadButton.disabled = false;
        if (hint) hint.style.opacity = previousHintOpacity;
      }
    });
  }

  document.title = `${poem.title || poem.id} | 诗词`;
}

const root = document.getElementById('poem-root');
const requestedId = getPoemId();
const poemIndex = requestedId
  ? poems.findIndex((poem) => String(poem.id) === requestedId)
  : 0;

if (poemIndex < 0 || !poems[poemIndex]) {
  renderNotFound(root);
} else {
  renderPoem(root, poems[poemIndex], poemIndex);
}
</script>
