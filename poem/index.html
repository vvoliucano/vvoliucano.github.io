---
layout: page-zh
permalink: /poem/
title: 诗词
class: poem-page-wrapper
---

<style>
@font-face {
    font-family: "OuyangxunKaishu";
    src: url("{{ '/assets/font/正欧阳询楷书+简繁.TTF' | relative_url | replace: '+', '%2B' }}") format("truetype");
    font-display: swap;
}

.poem-detail-page {
    max-width: 1140px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
    --poem-font-main: "OuyangxunKaishu", "STKaiti", "KaiTi", "Kaiti SC", serif;
    --poem-font-note: "STFangsong", "FangSong", "华文仿宋", "FangSong_GB2312", serif;
    --poem-paper: #fbf8f1;
    --poem-paper-deep: #f0e8da;
    --poem-ink: #25384a;
    --poem-muted: #786851;
    --poem-rule: rgba(130, 99, 58, 0.26);
}

.poem-detail-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
}

.poem-detail-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.7rem;
}

.poem-detail-link {
    display: inline-block;
    padding: 0.1rem 0.2rem;
    color: #5a4a34;
    text-decoration: none;
    font-family: var(--poem-font-main);
    font-size: 1.05rem;
    letter-spacing: 0.08em;
    border-bottom: 1px solid rgba(121, 101, 71, 0.18);
    transition: color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
}

.poem-detail-link:hover {
    color: #392d1f;
    border-color: rgba(121, 101, 71, 0.44);
    transform: translateY(-1px);
}

.poem-detail-card {
    background: transparent;
    border: 0;
    border-radius: 0;
    box-shadow: none;
    overflow: visible;
}

.poem-detail-body {
    position: relative;
    padding: 1.1rem 1.25rem 1.8rem;
    max-width: 980px;
    margin: 0 auto;
}

.poem-sheet-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 0.5rem;
    scroll-behavior: smooth;
    width: 100%;
    text-align: center;
}

.poem-sheet-scroll::-webkit-scrollbar {
    height: 10px;
}

.poem-sheet-scroll::-webkit-scrollbar-thumb {
    background: rgba(121, 101, 71, 0.22);
    border-radius: 999px;
}

.poem-sheet {
    position: relative;
    display: inline-block;
    width: max-content;
    min-width: 100%;
    box-sizing: border-box;
    padding: 1.8rem 2.2rem;
    border-radius: 6px;
    border: 1px solid rgba(145, 121, 86, 0.16);
    background:
        linear-gradient(180deg, rgba(255, 251, 244, 0.72), rgba(249, 241, 225, 0.92)),
        repeating-linear-gradient(
            0deg,
            rgba(110, 87, 53, 0.018) 0px,
            rgba(110, 87, 53, 0.018) 1px,
            rgba(255, 255, 255, 0) 2px,
            rgba(255, 255, 255, 0) 6px
        ),
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.48), transparent 28%),
        radial-gradient(circle at 78% 72%, rgba(190, 160, 112, 0.12), transparent 36%),
        linear-gradient(180deg, var(--poem-paper) 0%, #f7f2e8 100%);
    box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.38),
        0 10px 26px rgba(84, 57, 27, 0.08);
    overflow: hidden;
}

.poem-sheet-paper-wrap {
    position: absolute;
    inset: -2px;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 6px;
}

.poem-sheet-paper {
    display: block;
    width: 100%;
    height: 100%;
    opacity: 0.48;
    mix-blend-mode: multiply;
}

.poem-sheet-content {
    position: relative;
    z-index: 1;
}

.poem-sheet-hint {
    position: absolute;
    top: 0.1rem;
    right: 1.6rem;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.2rem 0.55rem;
    color: rgba(96, 78, 54, 0.78);
    font-family: var(--poem-font-main);
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    background: linear-gradient(90deg, rgba(255, 252, 246, 0), rgba(255, 252, 246, 0.9), rgba(255, 252, 246, 0));
    pointer-events: none;
    transition: opacity 0.2s ease;
}

.poem-sheet-hint::before,
.poem-sheet-hint::after {
    content: "";
    width: 1.6rem;
    height: 1px;
    background: linear-gradient(90deg, rgba(123, 98, 67, 0), rgba(123, 98, 67, 0.55));
}

.poem-sheet-hint::after {
    transform: scaleX(-1);
}

.poem-sheet::before,
.poem-sheet::after {
    content: "";
    position: absolute;
    top: 1rem;
    bottom: 1rem;
    width: 2px;
    background: linear-gradient(180deg, rgba(167, 47, 37, 0.18), rgba(167, 47, 37, 0.34), rgba(167, 47, 37, 0.18));
}

.poem-sheet::before {
    right: 1.15rem;
}

.poem-sheet::after {
    left: 1.15rem;
}

.poem-sheet-titleblock {
    position: absolute;
    top: 1.65rem;
    right: 1.95rem;
    color: var(--poem-ink);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.35rem;
}

.poem-sheet-footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 0.42rem;
    padding: 0 0.05rem 0.05rem 0.05rem;
    min-width: 4.8rem;
    flex: 0 0 auto;
    align-self: flex-end;
}

.poem-sheet-signature {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-family: var(--poem-font-main);
    color: rgba(78, 60, 40, 0.88);
    font-size: 1.05rem;
    letter-spacing: 0.1em;
    line-height: 1.55;
}

.poem-sheet-qr {
    display: block;
    margin-top: 0.1rem;
}

.poem-qr-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}

.poem-qr-frame {
    padding: 0;
    background: transparent;
    border: 0;
    border-radius: 0;
    box-shadow: none;
}

.poem-qr-canvas {
    display: block;
    width: 68px;
    height: 68px;
}

.poem-sheet-title {
    font-family: var(--poem-font-main);
    font-size: 2rem;
    line-height: 1.25;
    letter-spacing: 0.14em;
    writing-mode: vertical-rl;
    text-orientation: mixed;
}

.poem-sheet-meta {
    font-size: 0.86rem;
    line-height: 1.2;
    color: var(--poem-muted);
    letter-spacing: 0.08em;
    writing-mode: horizontal-tb;
}

.poem-sheet-body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 0.35rem;
    min-height: 0;
    padding: 0.6rem 4.9rem 0.6rem 0.9rem;
    width: max-content;
    min-width: calc(100% - 5.8rem);
    box-sizing: border-box;
}

.poem-lines {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-family: var(--poem-font-main);
    color: var(--poem-ink);
    font-size: 2.1rem;
    line-height: 1.8;
    letter-spacing: 0.12em;
}

.poem-line {
    position: relative;
    white-space: nowrap;
    padding: 0 0.42rem;
    min-width: 3.3rem;
}

.poem-line-text {
    position: relative;
    display: inline-block;
    color: rgba(37, 56, 74, 0.92);
    opacity: 0.96;
    text-shadow: 0 0 0.18px rgba(24, 38, 52, 0.22);
}

.poem-exporting .poem-line-text {
    color: rgba(37, 56, 74, 0.94);
    text-shadow: none;
}

.poem-exporting .poem-sheet-title,
.poem-exporting .poem-sheet-signature {
    color: rgba(37, 56, 74, 0.94);
    text-shadow: none;
}

.poem-line::before,
.poem-line::after {
    content: "";
    position: absolute;
    top: 0.2rem;
    bottom: 0.2rem;
    width: 1px;
    background: var(--poem-rule);
}

.poem-line::before {
    right: 0;
}

.poem-line::after {
    left: 0;
}

.poem-divider {
    min-width: 1.45rem;
}

.poem-spacer {
    min-width: 1.45rem;
}

.poem-divider::before,
.poem-divider::after,
.poem-spacer::before,
.poem-spacer::after {
    display: none;
}

.poem-supporting {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 1rem;
    padding: 0 1.6rem 1.8rem;
    max-width: 980px;
    margin: 0 auto;
}

.poem-download-bar {
    max-width: 980px;
    margin: 0 auto 1.1rem;
    padding: 0 1.6rem;
    display: flex;
    justify-content: flex-end;
}

.poem-download-button {
    border: 0;
    background: none;
    cursor: pointer;
}

.poem-panel {
    background: rgba(255, 251, 243, 0.86);
    border: 1px solid rgba(145, 121, 86, 0.12);
    border-radius: 14px;
    padding: 1.15rem 1.2rem;
}

.poem-panel-title {
    margin: 0 0 0.8rem;
    color: #5e4d36;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.12em;
}

.poem-notes-list {
    margin: 0;
    padding-left: 0;
    color: #4f5e6a;
    line-height: 1.9;
    list-style: none;
    font-family: var(--poem-font-note);
}

.poem-note-line + .poem-note-line {
    margin-top: 0.65rem;
}

.poem-notes-list a {
    word-break: break-word;
}

.poem-images {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
}

.poem-images a {
    display: block;
    width: 100%;
}

.poem-images img {
    width: min(100%, 940px);
    height: auto;
    border-radius: 12px;
    display: block;
    margin: 0 auto;
    box-shadow: 0 10px 22px rgba(52, 36, 18, 0.12);
}

.poem-empty {
    padding: 3rem 2rem;
    text-align: center;
    color: #607286;
}

.poem-empty h1 {
    margin-top: 0;
    font-weight: 500;
    color: #23384e;
}

.poem-empty ul {
    list-style: none;
    padding: 0;
    margin: 1.5rem 0 0;
}

.poem-empty li + li {
    margin-top: 0.6rem;
}

@media (max-width: 900px), (orientation: portrait) {
    .poem-detail-toolbar {
        gap: 0.7rem;
    }

    .poem-detail-nav {
        gap: 0.65rem;

    .poem-detail-link {
        font-size: 1.32rem;
        line-height: 1.55;
    }

    .poem-detail-body {
        padding: 0.9rem 0.45rem 1rem;
    }

    .poem-supporting {
        padding: 0 0.45rem 1.2rem;
    }

    .poem-download-bar {
        padding: 0 0.45rem;
        margin-bottom: 0.9rem;
    }

    .poem-sheet {
        min-width: 100%;
        padding: 1rem 1.1rem;

    .poem-sheet-titleblock {
        top: 0.95rem;
        right: 1.05rem;
    }

    .poem-qr-canvas {
        width: 58px;
        height: 58px;
    }

    .poem-sheet-signature {
        font-size: 0.96rem;
    }

    .poem-sheet-title {
        font-size: 1.8rem;
    }

    .poem-sheet-meta {
        font-size: 0.9rem;
    }

    .poem-sheet-body {
        min-height: 0;
        padding: 0.35rem 3.9rem 0.35rem 0.35rem;
        height: auto !important;
    }

    .poem-sheet-footer {
        min-width: 4.6rem;
        gap: 0.32rem;
    }

    .poem-lines {
        font-size: 1.95rem;
        line-height: 1.72;
        letter-spacing: 0.1em;
    }

    .poem-line {
        min-width: 3.1rem;
        padding: 0 0.34rem;
    }

    .poem-sheet-hint {
        right: 0.7rem;
        font-size: 0.82rem;
    }

    .poem-notes-list {
        font-size: 1.9rem;

    }
}

@media (max-width: 600px), (max-aspect-ratio: 1/1) {
    .poem-detail-toolbar {
        gap: 0.6rem;
    }

    .poem-detail-nav {
        gap: 0.55rem;
    }

    .poem-detail-link {
        font-size: 1.45rem;
        line-height: 1.5;
    }

    .poem-detail-body {
        padding: 0.55rem 0.15rem 0.8rem;
    }

    .poem-supporting {
        gap: 0.85rem;
        padding: 0 0.15rem 1rem;
    }

    .poem-download-bar {
        padding: 0 0.15rem;
    }

    .poem-sheet {
        min-width: 100%;
        padding: 0.7rem 0.75rem;
    }

    .poem-sheet-titleblock {
        top: 0.62rem;
        right: 0.72rem;
    }

    .poem-qr-frame {
        padding: 0.25rem;
    }

    .poem-qr-canvas {
        width: 46px;
        height: 46px;
    }

    .poem-sheet-footer {
        gap: 0.28rem;
        padding-left: 0.05rem;
        min-width: 3.8rem;
    }

    .poem-sheet-signature {
        font-size: 0.88rem;
    }

    .poem-sheet-title {
        font-size: 2.45rem;
    }

    .poem-sheet-body {
        padding: 0.1rem 4.9rem 0.1rem 0.05rem;
        height: auto !important;
    }

    .poem-lines {
        font-size: 2.8rem;
        line-height: 1.52;
        letter-spacing: 0.08em;
    }

    .poem-line {
        min-width: 4.15rem;
        padding: 0 0.38rem;
    }

    .poem-sheet-hint {
        right: 0.35rem;
        font-size: 1rem;
    }

    .poem-panel {
        padding: 1rem 0.95rem;
    }

    .poem-panel-title {
        font-size: 1.9rem;
    }

    .poem-notes-list {
        font-size: 2.65rem;
        line-height: 1.95;
    }

    }

    .poem-download-button {
        font-size: 1.45rem;
    }

</style>

<svg aria-hidden="true" width="0" height="0" style="position:absolute;left:-9999px;overflow:hidden">
  <defs>
    <filter id="roughpaper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.050" result="noise" numOctaves="25"></feTurbulence>
      <feDiffuseLighting in="noise" lighting-color="#FBF8F1" surfaceScale="0.88">
        <feDistantLight azimuth="24" elevation="46"></feDistantLight>
      </feDiffuseLighting>
    </filter>
  </defs>
</svg>

<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<div
  class="poem-detail-page"
  id="poem-page"
  data-poem-base-url="{{ '/poem/' | relative_url }}"
  data-other-page-url="{{ '/mushan/' | relative_url }}"
  data-poetry-asset-base="{{ '/assets/poetry/' | relative_url }}"
  data-font-url="{{ '/assets/font/正欧阳询楷书+简繁.TTF' | relative_url | replace: '+', '%2B' }}"
>
  <div class="poem-detail-toolbar">
    <div class="poem-detail-nav">
      <a class="poem-detail-link" href="{{ '/mushan/' | relative_url }}">返回诗集</a>
      <a class="poem-detail-link" id="poem-back-to-item" href="{{ '/other/' | relative_url }}">返回当前条目</a>
    </div>
    <div class="poem-detail-nav" id="poem-prev-next"></div>
  </div>

  <div id="poem-root" class="poem-detail-card">
    <div class="poem-empty">正在载入诗词...</div>
  </div>
</div>

<script id="poem-data" type="application/json">{{ site.data.other | jsonify }}</script>
<script>
const poemPage = document.getElementById('poem-page');
const poemDataNode = document.getElementById('poem-data');
const poems = poemDataNode ? JSON.parse(poemDataNode.textContent) : [];
const poemBaseUrl = poemPage ? poemPage.dataset.poemBaseUrl : '/poem/';
const otherPageUrl = poemPage ? poemPage.dataset.otherPageUrl : '/mushan/';
const poetryAssetBase = poemPage ? poemPage.dataset.poetryAssetBase : '/assets/poetry/';

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getPoemId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

function normalizeList(value) {
  if (!value) return [];
  return Array.isArray(value) ? value : [value];
}

function renderMarkdownLine(text) {
  let html = escapeHtml(text);
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  html = html.replace(/&lt;(https?:\/\/[^&]+)&gt;/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
  return html;
}

function getContentEntries(lines) {
  return normalizeList(lines).map((line) => {
    const text = String(line == null ? '' : line);
    const stripped = text.trim();
    if (!stripped) {
      return { type: 'spacer', text: '' };
    }
    if (stripped === '---') {
      return { type: 'divider', text: '' };
    }
    return { type: 'text', text };
  });
}

function buildContent(lines) {
  return getContentEntries(lines).map((entry) => {
    if (entry.type === 'spacer') return '<div class="poem-line poem-spacer" aria-hidden="true"></div>';
    if (entry.type === 'divider') return '<div class="poem-line poem-divider" aria-hidden="true"></div>';
    return `<div class="poem-line"><span class="poem-line-text">${escapeHtml(entry.text)}</span></div>`;
  }).join('');
}

function estimatePoemHeight(entries) {
  const textEntries = entries.filter((entry) => entry.type === 'text');
  if (!textEntries.length) return 420;
  const charCounts = textEntries.map((entry) => Array.from(entry.text).length);
  const maxChars = Math.max(...charCounts, 8);
  return Math.max(320, Math.min(860, maxChars * 42 + 90));
}

function convertYearToSeal(year) {
  const map = {
    '0': '零',
    '1': '壹',
    '2': '贰',
    '3': '叁',
    '4': '肆',
    '5': '伍',
    '6': '陆',
    '7': '柒',
    '8': '捌',
    '9': '玖',
  };
  return String(year || '').split('').map((digit) => map[digit] || digit).join('');
}

function buildReading(poem) {
  const qrUrl = `https://liucan.me/poem/?id=${encodeURIComponent(poem.id || '')}`;
  const sealYear = convertYearToSeal(poem.year);
  return `
    <div class="poem-sheet-hint" id="poem-scroll-hint">左右滑动</div>
    <div class="poem-sheet-scroll">
      <div class="poem-sheet">
        <div class="poem-sheet-paper-wrap" aria-hidden="true">
          <svg class="poem-sheet-paper" preserveAspectRatio="none" viewBox="0 0 100 100">
            <rect x="0" y="0" width="100" height="100" fill="#fbf8f1" filter="url(#roughpaper)"></rect>
          </svg>
        </div>
        <div class="poem-sheet-content">
          <div class="poem-sheet-titleblock">
            <div class="poem-sheet-title">${escapeHtml(poem.title || poem.id)}</div>
          </div>
          <div class="poem-sheet-body">
            <div class="poem-sheet-footer">
              <div class="poem-sheet-signature">${escapeHtml(sealYear)}年 作</div>
              <div class="poem-sheet-qr">
                <a class="poem-qr-link" id="poem-qr-link" href="${qrUrl}" target="_blank" rel="noopener noreferrer">
                  <span class="poem-qr-frame">
                    <canvas class="poem-qr-canvas" id="poem-qr-canvas" width="172" height="172"></canvas>
                  </span>
                </a>
              </div>
            </div>
            <div class="poem-lines">
              ${buildContent(poem.content)}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function buildNotes(description) {
  const notes = normalizeList(description);
  if (!notes.length) return '';
  const items = notes.map((line) => `<div class="poem-note-line">${renderMarkdownLine(String(line))}</div>`).join('');
  return `
    <section class="poem-panel">
      <h2 class="poem-panel-title">注释</h2>
      <div class="poem-notes-list">${items}</div>
    </section>
  `;
}

function buildImages(images, title) {
  const imageList = normalizeList(images);
  if (!imageList.length) return '';
  const items = imageList.map((img) => {
    const src = `${poetryAssetBase}${img}`;
    return `<a href="${src}" target="_blank" rel="noopener noreferrer"><img src="${src}" alt="${escapeHtml(title)}" /></a>`;
  }).join('');
  return `
    <section class="poem-panel">
      <h2 class="poem-panel-title">配图</h2>
      <div class="poem-images">${items}</div>
    </section>
  `;
}

function buildMeta(poem) {
  const parts = [];
  if (poem.year) parts.push(`${poem.year}`);
  const type = normalizeList(poem.type).join(' · ');
  if (type) parts.push(type);
  return parts.join(' · ');
}

function poemUrl(id) {
  return `${poemBaseUrl}?id=${encodeURIComponent(id)}`;
}

function otherItemUrl(id) {
  return `${otherPageUrl}#${encodeURIComponent(id)}`;
}

function renderNotFound(root) {
  const sampleLinks = poems.slice(0, 8).map((poem) => {
    return `<li><a href="${poemUrl(poem.id)}">${escapeHtml(poem.title || poem.id)}</a></li>`;
  }).join('');

  root.innerHTML = `
    <div class="poem-empty">
      <h1>没有找到对应诗词</h1>
      <p>请从诗集列表重新进入，或直接选择一首浏览。</p>
      <ul>${sampleLinks}</ul>
    </div>
  `;
  document.title = '未找到诗词';
}

function renderPoem(root, poem, index) {
  root.innerHTML = `
    <article>
      <div class="poem-detail-body">
        ${buildReading(poem)}
      </div>
      <div class="poem-download-bar">
        <button type="button" class="poem-detail-link poem-download-button" id="poem-download-button">下载</button>
      </div>
      <div class="poem-supporting">
        ${buildNotes(poem.description)}
        ${buildImages(poem.image, poem.title || poem.id)}
      </div>
    </article>
  `;

  const backToItem = document.getElementById('poem-back-to-item');
  if (backToItem) {
    backToItem.href = otherItemUrl(poem.id);
  }

  const prevNext = document.getElementById('poem-prev-next');
  if (prevNext) {
    const links = [];
    if (index > 0) {
      const prev = poems[index - 1];
      links.push(`<a class="poem-detail-link" href="${poemUrl(prev.id)}">上一首</a>`);
    }
    if (index < poems.length - 1) {
      const next = poems[index + 1];
      links.push(`<a class="poem-detail-link" href="${poemUrl(next.id)}">下一首</a>`);
    }
    prevNext.innerHTML = links.join('');
  }

  const qrCanvas = document.getElementById('poem-qr-canvas');
  if (qrCanvas && typeof QRious === 'function') {
    new QRious({
      element: qrCanvas,
      value: `https://vvoliucano.github.io/poem/?id=${encodeURIComponent(poem.id || '')}`,
      size: 172,
      level: 'M',
      foreground: '#8b2c24',
      background: 'transparent',
      padding: 10,
    });
  }

  const scrollBox = root.querySelector('.poem-sheet-scroll');
  const scrollHint = root.querySelector('#poem-scroll-hint');
  if (scrollBox) {
    requestAnimationFrame(() => {
      scrollBox.scrollLeft = scrollBox.scrollWidth;
      if (scrollHint && scrollBox.scrollWidth <= scrollBox.clientWidth + 8) {
        scrollHint.style.opacity = '0';
      }
    });

    scrollBox.addEventListener('scroll', () => {
      if (!scrollHint) return;
      const maxOffset = scrollBox.scrollWidth - scrollBox.clientWidth;
      if (maxOffset <= 8) {
        scrollHint.style.opacity = '0';
        return;
      }
      const nearRight = scrollBox.scrollLeft >= maxOffset - 12;
      scrollHint.style.opacity = nearRight ? '1' : '0.18';
    }, { passive: true });
  }

  const downloadButton = document.getElementById('poem-download-button');
  if (downloadButton) {
    downloadButton.addEventListener('click', async () => {
      const sheet = root.querySelector('.poem-sheet');
      const hint = root.querySelector('#poem-scroll-hint');
      if (!sheet || typeof html2canvas !== 'function') return;

      const previousHintOpacity = hint ? hint.style.opacity : '';
      if (hint) hint.style.opacity = '0';
      downloadButton.disabled = true;
      downloadButton.textContent = '生成中...';

      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));

        const canvas = await html2canvas(sheet, {
          backgroundColor: null,
          scale: Math.min(3, window.devicePixelRatio || 2),
          useCORS: true,
          logging: false,
          onclone: (clonedDocument) => {
            const clonedSheet = clonedDocument.querySelector('.poem-sheet');
            if (clonedSheet) {
              clonedSheet.classList.add('poem-exporting');
            }
          },
        });

        const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
        if (!blob) return;

        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${poem.id || 'poem'}.png`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        downloadButton.textContent = '下载 PNG';
      } catch (error) {
        console.error(error);
        downloadButton.textContent = '下载失败';
        setTimeout(() => {
          downloadButton.textContent = '下载 PNG';
        }, 1200);
      } finally {
        downloadButton.disabled = false;
        if (hint) hint.style.opacity = previousHintOpacity;
      }
    });
  }

  document.title = `${poem.title || poem.id} | 诗词`;
}

const root = document.getElementById('poem-root');
const requestedId = getPoemId();
const poemIndex = requestedId
  ? poems.findIndex((poem) => String(poem.id) === requestedId)
  : 0;

if (poemIndex < 0 || !poems[poemIndex]) {
  renderNotFound(root);
} else {
  renderPoem(root, poems[poemIndex], poemIndex);
}
</script>
